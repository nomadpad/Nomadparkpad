<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | Nomad Park Pad</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="phase8.css">
</head>
<body>
<header class="site-header"><a class="brand" href="index.html"><img src="logo.png" alt="Nomad Park Pad"></a></header>
<main class="auth-shell">
  <section class="auth-card">
    <p class="kicker">PASSWORD RESET</p>
    <h1>Get back on the road.</h1>
    <p class="auth-lead">Enter your email and we will send a password-reset link.</p>
    <form id="forgot-form">
      <label>Email address<input id="forgot-email" type="email" required></label>
      <button class="btn btn-accent full-button" type="submit">Send Reset Link</button>
      <p class="form-message" aria-live="polite"></p>
    </form>
    <div class="auth-links"><a href="login.html">Return to login</a></div>
  </section>
</main>
<script src="supabase-config.js"></script>
<script type="module" src="phase8-auth.js"></script>
</body>
</html>
