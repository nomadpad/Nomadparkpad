<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log In | Nomad Park Pad</title>
  <meta name="description" content="Log in to your Nomad Park Pad account.">
  <meta name="theme-color" content="#0f4b38">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="phase8.css">
</head>
<body>
<header class="site-header">
  <a class="brand" href="index.html"><img src="logo.png" alt="Nomad Park Pad"></a>
  <nav class="main-nav">
    <a href="find-a-pad.html">Find a Pad</a>
    <a href="become-a-host.html">Become a Host</a>
    <a href="sign-up.html">Create Account</a>
  </nav>
</header>

<main class="auth-shell">
  <section class="auth-card">
    <p class="kicker">WELCOME BACK</p>
    <h1>Log in to Nomad Park Pad.</h1>
    <p class="auth-lead">Access your trips, listings, requests, and messages.</p>

    <div class="setup-warning" data-setup-warning hidden>
      Supabase is not configured yet. Add your project URL and anon public key to <strong>supabase-config.js</strong>.
    </div>

    <form id="login-form">
      <label>Email address
        <input id="login-email" type="email" autocomplete="email" required>
      </label>
      <label>Password
        <input id="login-password" type="password" autocomplete="current-password" required>
      </label>
      <button class="btn btn-accent full-button" type="submit">Log In</button>
      <p class="form-message" aria-live="polite"></p>
    </form>

    <div class="auth-links">
      <a href="forgot-password.html">Forgot password?</a>
      <a href="sign-up.html">Create an account</a>
    </div>
  </section>
</main>

<script src="supabase-config.js"></script>
<script type="module" src="phase8-auth.js"></script>
</body>
</html>
