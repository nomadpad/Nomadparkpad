<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Complete | Nomad Park Pad</title>
  <meta name="description" content="Example Nomad Park Pad payment receipt.">
  <meta name="theme-color" content="#0f4b38">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="phase7.css">
</head>
<body>
<header class="site-header">
  <a class="brand" href="index.html"><img src="logo.png" alt="Nomad Park Pad"></a>
  <nav class="main-nav"><a href="traveler-dashboard.html">Traveler Dashboard</a><a href="trip-details.html">Trip Details</a></nav>
</header>

<main class="receipt-shell">
  <section class="success-card">
    <div class="success-icon">✓</div>
    <p class="kicker">DEMO PAYMENT COMPLETE</p>
    <h1>Your stay is confirmed.</h1>
    <p>No real money moved. This is a prototype receipt.</p>

    <div class="receipt-box">
      <div><span>Booking</span><strong>NPP-DEMO-0726</strong></div>
      <div><span>Pad</span><strong>Quiet Garden Driveway</strong></div>
      <div><span>Dates</span><strong>July 18 to July 19, 2026</strong></div>
      <div><span>Traveler</span><strong>Daniel Senetza</strong></div>
      <div><span>Total</span><strong>$27.30</strong></div>
      <div><span>Status</span><strong>Demo confirmed</strong></div>
    </div>

    <div class="success-actions">
      <a class="btn btn-primary" href="trip-details.html">View Trip Details</a>
      <a class="btn btn-accent" href="messages.html">Message Host</a>
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
