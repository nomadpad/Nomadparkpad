<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Create New Password | Nomad Park Pad</title>

  <link rel="stylesheet" href="styles.css">

  <link rel="stylesheet" href="phase8.css">

</head>

<body>

  <main class="auth-shell">

    <section class="auth-card">

      <p class="kicker">PASSWORD RESET</p>

      <h1>Create a new password</h1>

      <p class="auth-lead">

        Enter your new password below.

      </p>

      <form id="reset-password-form">

        <label>

          New password

          <input

            id="new-password"

            type="password"

            minlength="8"

            autocomplete="new-password"

            required

          >

        </label>

        <label>

          Confirm new password

          <input

            id="confirm-password"

            type="password"

            minlength="8"

            autocomplete="new-password"

            required

          >

        </label>

        <button class="btn btn-accent" type="submit">

          Save new password

        </button>

        <p class="form-message" id="reset-message"></p>

      </form>

    </section>

  </main>

  <script src="supabase-config.js"></script>

<script type="module" src="reset-password.js"></script>

</body>

</html>
